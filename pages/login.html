<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
    <form id="login_form" class="login_card"> <!--Creamos un formulario, todo lo que contenga dentro de este formulario se define-->
    <!-- Formulario de inicio de sesión -->
        <h2 class="login_text">Iniciar Sesión</h2> 
        <label for="email">Correo:</label> <!--Definimos la entrada para el correo, definimos el tipo de informacion que entra en este caso, emails.-->
        <input type="email" id="email" name="email" required placeholder="Ingrese su correo"> <!--Tiene una propiedad interna, llamada .valuefd-->
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
        <button type="submit" id="boton_login" class="boton_login"> Iniciar Sesion</button>
    </form>
</body>

<script src="/assets/js/login.js" name="login_js"></script>
</html>
