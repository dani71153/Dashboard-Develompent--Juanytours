<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Gestión de Viajes</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/settings.css">
    <style>
        #dashboard-container {
            zoom: var(--dashboard-zoom, 1);
        }
    </style>
    <script>
        (function () {
            const z = localStorage.getItem('dashboardZoom');
            if (z) document.documentElement.style.setProperty('--dashboard-zoom', z / 100);
        })();
    </script>
</head>
<body>

    <header id="main-header">
        <h1>Panel de Control de Viajes</h1>
        <div id="header-controls">
            <div id="zoom-control">
                <button id="zoom-out"  class="zoom-btn" type="button">−</button>
                <span id="zoom-badge">100%</span>
                <button id="zoom-in"   class="zoom-btn" type="button">+</button>
            </div>
            <button id="btnAbrir">Opciones</button>
        </div>
    </header>

    <main id="dashboard-container">
        <section id="section-mayoristas" class="dashboard-section">
            <h2>Mayoristas Turisticos</h2>
            <div id="container-mayoristas" class="data-wrapper">
                <ol id="mayoristas-list">
                    <li>Cargando datos de mayoristas...</li>
                </ol>
                </div>
        </section>

        <section id="section-hoteles" class="dashboard-section">
            <h2>Gestión de Hoteles</h2>
            <div id="container-hoteles" class="data-wrapper">
                <ol id="hoteles-list">
                    <li>Cargando datos de hoteles...</li>
                </ol>
                </div>
        </section>

        <section id="section-aviones" class="dashboard-section">
            <h2>Vuelos y Aviones</h2>
            <div id="container-aviones" class="data-wrapper">
                <ol id="aviones-list">
                    <li>Cargando datos de vuelos...</li>
                    </ol>
                </div>
        </section>

        <section id="section-renta" class="dashboard-section">
            <h2>Renta de Vehículos</h2>
            <div id="container-renta" class="data-wrapper">
                </div>
        </section>

    </main>

<div id="modalOpciones" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h2>Configuración del Dashboard</h2>
            <span id="btnCerrar" class="close-btn">&times;</span>
        </div>

        <!-- Tabs principales -->
        <div class="modal-tabs">
            <button class="modal-tab active" data-tab="visibilidad">Visibilidad</button>
            <button class="modal-tab"        data-tab="editor">Editor de Datos</button>
        </div>

        <div class="modal-body">

            <!-- ── Tab: Visibilidad ── -->
            <div id="tab-visibilidad" class="tab-panel">
                <div class="config-grid">

                    <div class="config-column">
                        <button id="toggle-mayoristas" class="config-item active">Ocultar Mayoristas</button>
                        <ol id="checklist-mayoristas" class="config-checklist-box-mayoristas"></ol>
                    </div>

                    <div class="config-column">
                        <button id="toggle-hotels" class="config-item active">Ocultar Hoteles</button>
                        <ol id="checklist-hoteles" class="config-checklist-box"></ol>
                    </div>

                    <div class="config-column">
                        <button id="toggle-airplanes" class="config-item active">Ocultar Aviones</button>
                        <ol id="checklist-aviones" class="config-checklist-box"></ol>
                    </div>

                    <div class="config-column">
                        <button id="toggle-cars" class="config-item active">Ocultar RentCar</button>
                        <ol id="checklist-rentcar" class="config-checklist-box">
                            <li><span class="editor-empty">Sin proveedores aún</span></li>
                        </ol>
                    </div>

                </div>
            </div>

            <!-- ── Tab: Editor de Datos ── -->
            <div id="tab-editor" class="tab-panel" hidden>
                <div class="editor-cat-tabs">
                    <button class="editor-cat-tab active" data-cat="mayoristas">Mayoristas</button>
                    <button class="editor-cat-tab"        data-cat="hoteles">Hoteles</button>
                    <button class="editor-cat-tab"        data-cat="aviones">Aviones</button>
                </div>
                <div id="editor-provider-list"></div>
            </div>

        </div>

        <div class="modal-footer">
            <button class="section-master-toggle btn">Desactivar / Activar Todo</button>
            <button id="btnCerrarModal" class="btn">Finalizar</button>
        </div>

    </div>
</div>
    <script src="./assets/js/script.js"></script>
</body>
</html>
