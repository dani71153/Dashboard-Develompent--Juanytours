backend:
  name: github
  repo: dani71153/Dashboard-Develompent--Juanytours
  branch: main
  base_url: https://sveltia-cms-auth.dna291.workers.dev/
  app_id: Ov23liYMVmD4PmQvFT4O   # ← esta línea

locale: es

site_url: https://dani71153.github.io/Dashboard-Develompent--Juanytours

media_folder: assets/img
public_folder: assets/img

collections:

  # Opciones globales del dashboard (un solo archivo, editable directamente).
  - name: opciones
    label: "Opciones Generales"
    files:
      - name: options
        label: "Configuración General"
        file: data/options.json
        fields:
          - { name: titulo, label: "Título del panel (encabezado)", widget: string }
          - name: modoInicial
            label: "Modo con el que abre el dashboard"
            widget: select
            options:
              - { label: "Con acceso (login)", value: acceso }
              - { label: "Público (sin login)", value: publico }
            default: acceso
          - { name: tamanoTarjeta, label: "Tamaño de tarjeta por defecto (px)", widget: number, default: 260, value_type: int, min: 160, max: 440 }
          - { name: zoomInicial,   label: "Zoom inicial (%)", widget: number, default: 100, value_type: int, min: 60, max: 150 }
          - name: visibilidadSecciones
            label: "Visibilidad de secciones por modo"
            label_singular: "Sección"
            widget: list
            summary: "{{fields.seccion}} — acceso: {{fields.acceso}} · público: {{fields.publico}}"
            hint: "Define qué secciones se ven por defecto en cada modo. La 'clave' debe coincidir con la de la sección."
            fields:
              - { name: seccion, label: "Clave de la sección (ej. mayoristas)", widget: string }
              - { name: acceso,  label: "Visible en modo Con acceso", widget: boolean, default: true }
              - { name: publico, label: "Visible en modo Público",     widget: boolean, default: true }

  # Cada sección del dashboard es un archivo dentro de data/secciones/.
  # "Agregar Sección" crea un archivo nuevo; cada sección se edita por separado.
  - name: secciones
    label: "Secciones del Dashboard"
    label_singular: "Sección"
    folder: data/secciones
    create: true
    delete: true
    extension: json
    format: json
    identifier_field: titulo
    slug: "{{fields.key}}"
    summary: "{{fields.orden}}. {{fields.titulo}}"
    fields:
      - { name: orden,  label: "Orden (posición en el dashboard)", widget: number, default: 99, value_type: int }
      - { name: key,    label: "Clave (única, minúsculas, sin espacios)", widget: string, hint: "También es el nombre del archivo. Ej: seguros, traslados." }
      - { name: titulo, label: "Título (encabezado de la tarjeta)", widget: string }
      - { name: label,  label: "Nombre corto (para botones)", widget: string }
      - { name: color,  label: "Color de acento", widget: color, default: "#06b6d4" }
      - { name: tint,   label: "Color de fondo al pasar el mouse", widget: color, default: "#f0fdfe" }
      # La visibilidad por defecto de la SECCIÓN se controla en "Opciones Generales"
      # (visibilidadSecciones). Aquí solo se define el contenido de la sección.
      - name: proveedores
        label: Proveedores
        label_singular: Proveedor
        widget: list
        summary: "{{fields.nombre}}"
        fields:
          - { name: id,             label: "ID (sin espacios)",       widget: string }
          - { name: nombre,         label: Nombre,                    widget: string }
          - { name: enlace_portal,  label: "URL con acceso (login)",  widget: string }
          - { name: enlace_publico, label: "URL pública (sin login)", widget: string, required: false }
          - { name: logo,           label: Logo,                      widget: image }
          - name: prioridad
            label: Prioridad
            widget: select
            options: [alta, media, baja]
            default: alta
          - { name: urgente, label: Urgente, widget: boolean, default: false }
          - { name: mostrar_acceso,  label: "Mostrar por defecto en modo Con acceso", widget: boolean, default: true }
          - { name: mostrar_publico, label: "Mostrar por defecto en modo Público",    widget: boolean, default: true }
